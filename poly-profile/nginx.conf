server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;
    # ALB(HTTPS 종단) 뒤라 스킴을 모름 — 상대경로 리다이렉트로 https 유지
    absolute_redirect off;

    # ALB 헬스체크
    location = /profile/health {
        default_type text/plain;
        return 200 'ok';
    }

    # 프로필 정적 사이트 — /profile/* 아래 index/onboard/editor/p + showcase
    location /profile {
        try_files $uri $uri/ /profile/index.html;
    }
}
