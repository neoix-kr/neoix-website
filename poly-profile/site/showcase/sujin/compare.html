<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김수진 시안 비교 보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:#eee;font-family:'Pretendard Variable',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1400px;margin:0 auto;padding:36px 24px 80px;}
h1{font-size:24px;font-weight:800;letter-spacing:-.02em;}
p.g{color:#999;font-size:14px;margin-top:8px;line-height:1.7;}
p.g b{color:#ffd34d;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:28px;}
.cell{border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;background:#1a1a1a;}
.cell .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #2a2a2a;}
.cell .no{width:26px;height:26px;border-radius:50%;background:#ffd34d;color:#111;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;}
.cell .hd b{font-size:14px;font-weight:700;}
.cell .hd span{font-size:11px;color:#888;margin-left:auto;}
.frame{height:640px;overflow:hidden;background:#000;}
.frame iframe{width:390px;height:1700px;border:0;transform:scale(.82);transform-origin:top left;}
@media(max-width:1100px){.grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <h1>김수진 시안 비교 — 번호로 골라주세요</h1>
  <p class="g">스크롤은 각 칸 안에서 안 되니 전체 느낌만 보시고, <b>"몇 번이 그나마 가까운지"</b> + <b>"어디가 거슬리는지"</b>(색/사진/글자/전체무드)를 말씀해주세요. 조합 지시도 됩니다 — 예: "③ 상단 + ① 아래".</p>
  <div class="grid">
    <div class="cell">
      <div class="hd"><span class="no">1</span><b>라이트 소프트 카드</b><span>흰 배경 · 사진 카드</span></div>
      <div class="frame"><iframe src="./?cb=3" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="hd"><span class="no">2</span><b>레드 포스터 히어로</b><span>당색 배경 + 슬로건</span></div>
      <div class="frame"><iframe src="./poster.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="hd"><span class="no">3</span><b>네이비 링크트리</b><span>nextgen 문법</span></div>
      <div class="frame"><iframe src="./navy.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="hd"><span class="no">4</span><b>공보물 에디토리얼</b><span>아이보리 · 괘선 (김민준 데모)</span></div>
      <div class="frame"><iframe src="../b/index.html" scrolling="no"></iframe></div>
    </div>
  </div>
</div>
</body>
</html>
