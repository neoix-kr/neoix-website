<style>

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,

    background: var(--bg); color: var(--text);

    letter-spacing: -0.01em;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; font-size: 14px; color: var(--text); }
  ::selection { background: var(--accent-soft); color: var(--accent); }

  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  .hidden { display: none !important; }

  /* ───── Auth screen ───── */
  .gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
  }
  .gate-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 36px 32px;
    width: 100%; max-width: 380px;
    box-shadow: var(--shadow-md);

  .gate-card .logo-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
  }
  .gate-card .logo-box {

  .sidebar-cta { padding: 0 12px 10px; }
  .new-task-btn {

  .sidebar-section-label {

  .user-bar {

  .role-pill {

  .task-card {

  .task-card:hover { border-color: var(--border-strong); background: #fbfbfc; }
  .task-card.active {

  .task-card-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }

  .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .progress-track { flex: 1; height: 4px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }

  .task-card-meta .meta-item { display: inline-flex; align-items: center; gap: 3px; }
  .task-card-meta svg { width: 11px; height: 11px; }

  .due-badge {

    padding: 1px 6px; border-radius: 4px;

  }
  .due-badge.urgent { background: var(--danger-soft); color: var(--danger); }
  .due-badge.soon { background: var(--warning-soft); color: var(--warning); }
  .due-badge.over { background: var(--danger); color: #fff; }
  .due-badge svg { width: 10px; height: 10px; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px 2px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    border: 1px solid transparent; line-height: 1.3;
  }
  .status-pill::before {
    content: ""; width: 6px; height: 6px;
    border-radius: 50%; background: currentColor; opacity: 0.7;
  }
  .status-pill.notstarted { background: var(--panel-2); color: var(--text-2); border-color: var(--border-strong); }
  .status-pill.inprogress { background: var(--info-soft); color: #0369a1; border-color: #bae6fd; }
  .status-pill.review { background: var(--warning-soft); color: var(--warning-strong); border-color: #fde68a; }
  .status-pill.done { background: var(--success-soft); color: var(--success); border-color: #bbf7d0; }
  .empty-side { padding: 28px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Main */
  .main { overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }
  .main-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;

  }
  .main-empty .ill {

  .main-empty .ill svg { width: 26px; height: 26px; }
  .main-empty h2 { margin: 0; font-size: 17px; font-weight: 700; color: var(--text); }

  .top-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px 0; flex-shrink: 0; }

  .top-title {

  }
  .top-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .members { display: flex; align-items: center; margin-right: 6px; }
  .members .avatar-stack { display: flex; }
  .members .avatar-stack .av {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid #fff; margin-left: -6px;

  .members .avatar-stack .av:first-child { margin-left: 0; }
  .members .more { background: var(--panel-2); color: var(--text-2); }

  .tabs { display: flex; gap: 2px; margin: 0 -2px; }
  .tab {

  .file-overlay {

<script type="module">
  // Wait for supabase client to load
  if (!window.supabase) {
    await new Promise(r => window.addEventListener("supabase-ready", r, { once: true }));
  }
  const sb = window.supabase;
  const BUCKET = window.ORGX_CONFIG.STORAGE_BUCKET;

  // ─────────── State ───────────
  let state = {
    user: null,
    org: null,
    membership: null,
    members: [],
    orgs: [],
    tasks: [],
  };
  let selectedId = null;
  let currentTab = "overview";
  let openPlanId = null;
  let openFile = null;
  let pendingPin = null;
  let commentFilter = "all";
  let activeChannel = null;
  let activeTaskChannel = null;

  // ─────────── Helpers ───────────
  const fmtDate = (ts) => new Date(ts).toLocaleDateString("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit" });
  const fmtDateTime = (ts) => new Date(ts).toLocaleString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
  const fmtSize = (b) => {
    if (b < 1024) return b + " B";
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
    return (b / 1024 / 1024).toFixed(1) + " MB";
  };
  const escapeHtml = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  const calcProgress = (task) => {
    const plans = task.plans || [];
    if (plans.length === 0) return 0;
    return Math.round((plans.filter(p => p.done).length / plans.length) * 100);
  };
  const taskStatus = (task) => {
    const p = calcProgress(task);
    if ((task.plans || []).some(pl => pl.pending_review)) return { key: "review", label: "검토 대기" };
    if (p === 0) return { key: "notstarted", label: "시작 전" };
    if (p === 100) return { key: "done", label: "완료" };
    return { key: "inprogress", label: "진행중" };
  };
  function dueInfo(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dateStr); due.setHours(0,0,0,0);
    const diff = Math.round((due - today) / 86400000);
    let cls = "", label = "";
    if (diff < 0) { cls = "over"; label = `${Math.abs(diff)}일 지남`; }
    else if (diff === 0) { cls = "urgent"; label = "오늘"; }
    else if (diff <= 3) { cls = "urgent"; label = `D-${diff}`; }
    else if (diff <= 7) { cls = "soon"; label = `D-${diff}`; }
    else { label = `D-${diff}`; }
    return { cls, label, full: fmtDate(due) };
  }
  const AVATAR_COLORS = ["#6366f1","#8b5cf6","#ec4899","#ef4444","#f97316","#eab308","#22c55e","#14b8a6","#0ea5e9","#3b82f6"];
  function avatarColor(name) {
    let h = 0; for (let i = 0; i < (name||"").length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }
  const initial = (name) => (name?.[0] || "?").toUpperCase();
  const memberById = (id) => state.members.find(m => m.id === id) || null;
  const currentMember = () => state.membership;
  const currentName = () => state.membership?.display_name || "";
  const currentIsAdmin = () => ["admin","ceo"].includes(state.membership?.role);
  const roleLabel = (role) => role === "ceo" ? "대표" : role === "admin" ? "관리자" : "작업자";

  function uniqueContributors(task) {
    const set = new Set();
    (task.comments || []).forEach(c => set.add(c.author_name));
    (task.attachments || []).forEach(a => (a.comments || []).forEach(c => set.add(c.author_name)));
    (task.plans || []).forEach(p => (p.works || []).forEach(w => (w.comments || []).forEach(c => set.add(c.author_name))));
    return Array.from(set);
  }
  function totalCommentCount(task) {
    let n = (task.comments || []).length;
    (task.attachments || []).forEach(a => n += (a.comments || []).length);
    (task.plans || []).forEach(p => (p.works || []).forEach(w => n += (w.comments || []).length));
    return n;
  }
  function fileExt(name) { const i = name.lastIndexOf("."); return i >= 0 ? name.slice(i+1).toLowerCase() : ""; }
  function fileKind(att) {
    const t = att.mime_type || "";
    if (t.startsWith("image/")) return "image";
    if (t === "application/pdf") return "pdf";
    if (t.startsWith("text/") || /(json|xml|javascript|css|html|csv|markdown)/.test(t)) return "text";
    const ext = fileExt(att.name);
    if (["jpg","jpeg","png","gif","webp","svg","bmp"].includes(ext)) return "image";
    if (ext === "pdf") return "pdf";
    if (["txt","md","json","xml","csv","js","ts","html","css","yml","yaml","log"].includes(ext)) return "text";
    return "other";
  }

  // SVG icons
  const I = {
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',

    paperclip: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>',
    chat: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
    activity: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',

  // ─────────── DB Functions ───────────
  async function loadOrgs() {
    const { data, error } = await sb.from("memberships")
      .select("role, orgs(id, name, owner_id, created_at)")
      .eq("user_id", state.user.id);
    if (error) { console.error(error); return []; }
    return (data || []).filter(m => m.orgs).map(m => ({ ...m.orgs, _role: m.role }));
  }

  async function selectOrg(orgId) {
    const [orgRes, memRes, taskRes] = await Promise.all([
      sb.from("orgs").select("*").eq("id", orgId).single(),
      sb.from("memberships").select("*").eq("org_id", orgId),
      sb.from("tasks").select("*").eq("org_id", orgId).order("created_at", { ascending: false }),
    ]);
    if (orgRes.error) return console.error(orgRes.error);
    state.org = orgRes.data;
    state.members = memRes.data || [];
    state.membership = state.members.find(m => m.user_id === state.user.id);
    state.tasks = (taskRes.data || []).map(t => ({ ...t, plans: [], attachments: [], comments: [], feedbacks: [] }));
    if (state.tasks.length > 0) {
      selectedId = state.tasks[0].id;
      await loadTaskDeep(selectedId);
    } else {
      selectedId = null;
    }
    subscribeOrg(orgId);
  }

  async function loadTaskDeep(taskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    const [plans, atts, fbs] = await Promise.all([
      sb.from("plans").select("*").eq("task_id", taskId).order("position").order("created_at"),
      sb.from("attachments").select("*").eq("task_id", taskId).order("created_at"),
      sb.from("feedbacks").select("*").eq("task_id", taskId).order("created_at"),
    ]);
    if (plans.error) console.error(plans.error);
    const plansArr = (plans.data || []).map(p => ({ ...p, works: [] }));
    const attsArr = (atts.data || []).map(a => ({ ...a, comments: [] }));

    // Load all comments for this task and its attachments
    const attIds = attsArr.map(a => a.id);
    const orFilter = attIds.length > 0
      ? `task_id.eq.${taskId},attachment_id.in.(${attIds.join(",")})`
      : `task_id.eq.${taskId}`;
    const { data: comments } = await sb.from("comments").select("*").or(orFilter).order("created_at");
    (comments || []).forEach(c => {
      if (c.attachment_id) {
        const a = attsArr.find(x => x.id === c.attachment_id);
        if (a) a.comments.push(c);
      }
    });
    const generalComments = (comments || []).filter(c => !c.attachment_id);

    // Group attachments into plans (plan_id) vs reference (no plan_id)
    plansArr.forEach(p => { p.works = attsArr.filter(a => a.plan_id === p.id); });
    const refAttachments = attsArr.filter(a => !a.plan_id);

    task.plans = plansArr;
    task.attachments = refAttachments;
    task.feedbacks = fbs.data || [];
    task.comments = generalComments;

    subscribeTask(taskId);
  }

  // ─────────── Realtime ───────────
  function subscribeOrg(orgId) {
    if (activeChannel) sb.removeChannel(activeChannel);
    activeChannel = sb.channel(`org:${orgId}`)
      .on("postgres_changes", { event: "*", schema: "public", table: "tasks", filter: `org_id=eq.${orgId}` }, async (payload) => {
        if (payload.eventType === "INSERT") {
          if (!state.tasks.find(t => t.id === payload.new.id)) {
            state.tasks.unshift({ ...payload.new, plans: [], attachments: [], comments: [], feedbacks: [] });
            renderAll();
          }
        } else if (payload.eventType === "UPDATE") {
          const t = state.tasks.find(x => x.id === payload.new.id);
          if (t) Object.assign(t, payload.new);
          renderAll();
        } else if (payload.eventType === "DELETE") {
          state.tasks = state.tasks.filter(t => t.id !== payload.old.id);
          if (selectedId === payload.old.id) selectedId = state.tasks[0]?.id || null;
          renderAll();
        }
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "memberships", filter: `org_id=eq.${orgId}` }, async () => {
        const { data } = await sb.from("memberships").select("*").eq("org_id", orgId);
        state.members = data || [];
        state.membership = state.members.find(m => m.user_id === state.user.id);
        renderAll();
      })
      .subscribe();
  }

  function subscribeTask(taskId) {
    if (activeTaskChannel) sb.removeChannel(activeTaskChannel);
    const refresh = async () => {
      await loadTaskDeep(taskId);
      renderAll();
    };
    activeTaskChannel = sb.channel(`task:${taskId}`)
      .on("postgres_changes", { event: "*", schema: "public", table: "plans", filter: `task_id=eq.${taskId}` }, refresh)
      .on("postgres_changes", { event: "*", schema: "public", table: "attachments", filter: `task_id=eq.${taskId}` }, refresh)
      .on("postgres_changes", { event: "*", schema: "public", table: "feedbacks", filter: `task_id=eq.${taskId}` }, refresh)
      .on("postgres_changes", { event: "*", schema: "public", table: "comments" }, async (payload) => {
        // Only refresh if comment is for this task or one of its attachments
        const c = payload.new || payload.old;
        const task = state.tasks.find(t => t.id === taskId);
        if (!task) return;
        const attIds = new Set(task.attachments.map(a => a.id).concat((task.plans || []).flatMap(p => (p.works || []).map(w => w.id))));
        if (c?.task_id === taskId || attIds.has(c?.attachment_id)) await refresh();
      })
      .subscribe();
  }

          </div>
        </div>
        <div class="tabs">
          <button class="tab ${currentTab === "overview" ? "active" : ""}" data-tab="overview">${I.list} 개요</button>
          <button class="tab ${currentTab === "files" ? "active" : ""}" data-tab="files">${I.paperclip} 자료 <span class="tc">${(task.attachments || []).length}</span></button>
          <button class="tab ${currentTab === "comments" ? "active" : ""}" data-tab="comments">${I.chat} 댓글 <span class="tc">${totalComments}</span></button>
        </div>
      </div>
      <div class="tab-body" id="tabBody"></div>
    `;
    renderTabBody(task);
    bindTopEvents(task);
  }

  function renderTabBody(task) {
    const body = document.getElementById("tabBody");
    if (currentTab === "overview" && openPlanId) {
      const plan = (task.plans || []).find(p => p.id === openPlanId);
      if (!plan) { openPlanId = null; return renderTabBody(task); }
      body.innerHTML = renderPlanWorkspace(task, plan);
      bindPlanWorkspace(task, plan);
    } else if (currentTab === "overview") {
      body.innerHTML = renderOverview(task);
      bindOverview(task);
    } else if (currentTab === "files") {
      body.innerHTML = renderFiles(task);
      bindFiles(task);
    } else if (currentTab === "comments") {
      body.innerHTML = renderComments(task);
      bindComments(task);
    }
  }

  // ─────────── Overview ───────────
  function renderOverview(task) {
    const p = calcProgress(task);
    const doneCount = (task.plans || []).filter(x => x.done).length;
    const C = 2 * Math.PI * 36;
    const offset = C - (p / 100) * C;
    const fillCls = p === 100 ? "done" : "";
    return `
      <div class="desc-block ${task.description ? "" : "empty"}">${task.description ? escapeHtml(task.description) : "설명이 없습니다"}</div>
      <div class="progress-hero">
        <div>
          <div class="label">진행 상황</div>
          <div class="value">전체 ${(task.plans || []).length}개 중 <strong>${doneCount}개</strong> 완료</div>
          <div class="bar"><div class="bar-fill ${fillCls}" style="width:${p}%"></div></div>
          <div class="value" style="color:var(--muted);font-size:12px">계획을 클릭하면 작업 공간 · 관리자 승인 시 완료 처리</div>
        </div>
        <div class="donut">
          <svg viewBox="0 0 80 80">
            <circle class="track" cx="40" cy="40" r="36" fill="none" stroke-width="7"/>
            <circle class="fill ${fillCls}" cx="40" cy="40" r="36" fill="none" stroke-width="7" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="donut-text">${p}%</div>
        </div>
      </div>
      <div class="two-col">
        <div class="section">
          <div class="section-head">
            <h3><span class="icon-wrap">${I.list}</span>계획</h3>
            <span class="count-pill">${doneCount} / ${(task.plans || []).length}</span>
          </div>
          <ul class="plan-list" id="planList"></ul>
          <div class="add-row">
            <input type="text" class="input" id="planInput" placeholder="새 계획 추가 (Enter)" />
            <button class="btn btn-primary btn-sm" id="planAdd">${I.plus}추가</button>
          </div>
        </div>
        <div class="section">
          <div class="section-head">
            <h3><span class="icon-wrap">${I.activity}</span>진행 피드백</h3>
            <span class="count-pill">${(task.feedbacks || []).length}</span>
          </div>
          <ul class="feed-list" id="feedbackList"></ul>
          <div class="add-row">
            <input type="text" class="input" id="feedbackInput" placeholder="진행 상황을 한 줄로" />
            <button class="btn btn-primary btn-sm" id="feedbackAdd">남기기</button>
          </div>
        </div>
      </div>
    `;
  }

  function bindOverview(task) {
    renderPlans(task);
    renderFeedbacks(task);
    const planInput = document.getElementById("planInput");
    document.getElementById("planAdd").onclick = () => addPlan(task, planInput);
    planInput.onkeydown = (e) => e.key === "Enter" && addPlan(task, planInput);
    const fbInput = document.getElementById("feedbackInput");
    document.getElementById("feedbackAdd").onclick = () => addFeedback(task, fbInput);
    fbInput.onkeydown = (e) => e.key === "Enter" && addFeedback(task, fbInput);
  }

  function renderPlans(task) {
    const list = document.getElementById("planList");
    const plans = task.plans || [];
    if (plans.length === 0) {
      list.innerHTML = '<li style="color:var(--muted);padding:8px;font-size:13px">계획 항목을 추가하세요. 클릭하면 작업 공간이 열립니다.</li>';
      return;
    }
    list.innerHTML = plans.map(p => {
      const works = (p.works || []).length;
      const cm = (p.works || []).reduce((s, w) => s + (w.comments || []).length, 0);
      const stCls = p.done ? "done" : (p.pending_review ? "review" : "");
      const primary = memberById(p.primary_assignee_id);
      const secondary = memberById(p.secondary_assignee_id);
      const assignees = [primary, secondary].filter(Boolean);
      return `
        <li class="plan-item ${stCls}" data-id="${p.id}">
          <span class="check">${I.check}</span>
          <span class="plan-text">
            <span>${escapeHtml(p.text)}</span>
            ${p.pending_review ? `<span class="review-pill">${I.clock}검토 대기</span>` : ""}
            <span class="plan-counts">
              ${works > 0 ? `<span class="pc">${I.paperclip}${works}</span>` : ""}
              ${cm > 0 ? `<span class="pc">${I.chat}${cm}</span>` : ""}
            </span>
            ${assignees.length ? `<span class="plan-assignees">${assignees.map(m => `<span class="av-mini" style="background:${avatarColor(m.display_name)}" title="${escapeHtml(m.display_name)}">${initial(m.display_name)}</span>`).join("")}</span>` : ""}
          </span>
          <span class="plan-arrow">${I.arrowRight}</span>
          <button class="btn-icon-sm plan-del" title="삭제">${I.x}</button>
        </li>`;
    }).join("");

    list.querySelectorAll(".plan-item").forEach(el => {
      const id = el.dataset.id;
      el.querySelector(".check").onclick = (e) => {
        e.stopPropagation();
        togglePlanCompletion(plans.find(x => x.id === id));
      };
      el.querySelector(".plan-del").onclick = async (e) => {
        e.stopPropagation();
        if (!confirm("계획을 삭제할까요? 등록된 작업물도 함께 사라집니다.")) return;
        const { error } = await sb.from("plans").delete().eq("id", id);
        if (error) return toast(error.message);
      };
      el.onclick = () => { openPlanId = id; renderTabBody(task); };
    });
  }

  async function togglePlanCompletion(plan) {
    const isAdmin = currentIsAdmin();
    let updates = {};
    if (plan.done) {
      updates = { done: false, pending_review: false };
    } else if (plan.pending_review) {
      if (isAdmin) { updates = { done: true, pending_review: false }; toast("완료 승인됐어요"); }
      else { updates = { pending_review: false }; toast("검토 요청을 취소했어요"); }
    } else {
      if (isAdmin) updates = { done: true, pending_review: false };
      else { updates = { pending_review: true }; toast("관리자/대표에게 검토를 요청했어요"); }
    }
    const { error } = await sb.from("plans").update(updates).eq("id", plan.id);
    if (error) toast(error.message);
  }

  function renderFeedbacks(task) {
    const list = document.getElementById("feedbackList");
    const fbs = task.feedbacks || [];
    if (fbs.length === 0) {
      list.innerHTML = '<li style="color:var(--muted);padding:8px;font-size:13px">아직 피드백이 없어요.</li>';
      return;
    }
    list.innerHTML = fbs.slice().reverse().map(f => `
      <li class="feed-item" data-id="${f.id}">
        <span class="feed-dot"></span>
        <div class="feed-body">
          <div class="feed-text">${escapeHtml(f.body)}</div>
          <div class="feed-time">${fmtDateTime(f.created_at)}</div>
        </div>
        <button class="btn-icon-sm feed-del" title="삭제">${I.x}</button>
      </li>`).join("");
    list.querySelectorAll(".feed-del").forEach(el => {
      el.onclick = async () => {
        const id = el.closest(".feed-item").dataset.id;
        await sb.from("feedbacks").delete().eq("id", id);
      };
    });
  }

  async function addPlan(task, input) {
    const text = input.value.trim();
    if (!text) return;
    const position = (task.plans || []).length;
    const { error } = await sb.from("plans").insert({ task_id: task.id, text, position });
    if (error) return toast(error.message);
    input.value = "";
  }
  async function addFeedback(task, input) {
    const text = input.value.trim();
    if (!text) return;
    const { error } = await sb.from("feedbacks").insert({ task_id: task.id, body: text, author_id: state.user.id });
    if (error) return toast(error.message);
    input.value = "";
  }

  // ─────────── Plan workspace ───────────
  function renderPlanWorkspace(task, plan) {
    const works = plan.works || [];
    const stCls = plan.done ? "done" : (plan.pending_review ? "review" : "");
    const primary = memberById(plan.primary_assignee_id);
    const secondary = memberById(plan.secondary_assignee_id);
    const isAdmin = currentIsAdmin();

    let actions = "";
    if (plan.done) actions = `<button class="btn btn-sm" id="phReopen">${I.x}완료 해제</button>`;
    else if (plan.pending_review) {
      if (isAdmin) actions = `<button class="btn btn-sm btn-success" id="phApprove">${I.check}승인 (완료)</button> <button class="btn btn-sm btn-danger" id="phReject">${I.x}반려</button>`;
      else actions = `<button class="btn btn-sm" id="phCancelReview">${I.x}검토 취소</button>`;
    } else {
      actions = isAdmin
        ? `<button class="btn btn-sm btn-success" id="phMarkDone">${I.check}완료 처리</button>`
        : `<button class="btn btn-sm btn-warning" id="phRequestReview">${I.clock}수정 완료 (검토 요청)</button>`;
    }

    const reviewBanner = plan.pending_review ? `
      <div class="review-banner">
        <div class="rb-left">
          <span class="rb-icon">${I.clock}</span>
          <div class="rb-text">
            <strong>승인 대기 중</strong>
            <div>작업자가 수정을 마쳤어요. 관리자나 대표가 검토하고 승인하면 계획이 완료됩니다.</div>
          </div>
        </div>
        ${isAdmin ? `<div class="rb-actions">
          <button class="btn btn-sm btn-success" id="rbApprove">${I.check}승인</button>
          <button class="btn btn-sm btn-danger" id="rbReject">${I.x}반려</button>
        </div>` : ""}
      </div>` : "";

    return `
      <div class="plan-ws">
        <div class="breadcrumb">
          <a id="ws-back">${I.arrow}<span>개요</span></a>
          <span class="sep">/</span>
          <span class="current">${escapeHtml(plan.text)}</span>
        </div>
        <div class="plan-hero ${stCls}">
          <div class="ph-left">
            <span class="ph-check" id="phCheck">${I.check}</span>
            <div class="ph-info">
              <div class="ph-title">${escapeHtml(plan.text)}</div>
              <div class="ph-sub">
                ${plan.done ? "완료된 계획" : (plan.pending_review ? "승인 대기 중" : "진행 중")} · 작업물 ${works.length}개
              </div>
            </div>
          </div>
          <div class="ph-actions">
            ${actions}
            <button class="btn btn-sm" id="phEdit">${I.edit}이름</button>
            <button class="btn btn-sm btn-danger" id="phDelete">${I.trash}</button>
          </div>
        </div>
        ${reviewBanner}
        <div class="assignees-row">
          <div class="assignee-card">
            <div class="assignee-label">주 작업자</div>
            <div class="assignee-picker">
              <div class="assignee-pill" id="primaryPicker">
                <span class="av-mini ${primary ? "" : "empty"}" style="${primary ? `background:${avatarColor(primary.display_name)}` : ""}">${primary ? initial(primary.display_name) : "?"}</span>
                <span class="assignee-name ${primary ? "" : "empty"}">${primary ? escapeHtml(primary.display_name) : "지정 안 됨"}</span>
                ${primary ? `<span class="role-pill ${primary.role}">${roleLabel(primary.role)}</span>` : ""}
              </div>
            </div>
          </div>
          <div class="assignee-card">
            <div class="assignee-label">부 작업자</div>
            <div class="assignee-picker">
              <div class="assignee-pill" id="secondaryPicker">
                <span class="av-mini ${secondary ? "" : "empty"}" style="${secondary ? `background:${avatarColor(secondary.display_name)}` : ""}">${secondary ? initial(secondary.display_name) : "?"}</span>
                <span class="assignee-name ${secondary ? "" : "empty"}">${secondary ? escapeHtml(secondary.display_name) : "지정 안 됨"}</span>
                ${secondary ? `<span class="role-pill ${secondary.role}">${roleLabel(secondary.role)}</span>` : ""}
              </div>
            </div>
          </div>
        </div>
        <div class="tab-intro">
          <span class="ti-ic">${I.palette}</span>
          <div>
            <strong>작업 공간 — 작업물에 위치 핀으로 피드백</strong>
            <div>작업물 카드를 열고 댓글 박스의 <b>핀</b> 버튼을 작업물 위로 끌어다 놓으면 그 지점에 코멘트가 달려요. 수정이 끝나면 댓글 옆 체크로 해결 처리합니다.</div>
          </div>
        </div>
        <div class="files-tools">
          <div class="ws-section-head" style="margin-bottom:0">
            <h3>작업물 <span class="count-pill">${works.length}</span></h3>
          </div>
          <label class="btn btn-dark btn-sm" for="wsFileInput">
            ${I.upload}<span>작업물 추가</span>
            <input type="file" id="wsFileInput" multiple style="display:none" />
          </label>
        </div>
        ${works.length === 0
          ? `<div class="file-empty" id="wsDrop">
              <div class="upicon">${I.upload}</div>
              <p>여기에 작업물을 끌어다 놓거나 <label for="wsFileInput2" class="browse">클릭해서 선택</label></p>
              <p style="font-size:12px;color:var(--muted);margin-top:6px">파일당 최대 50MB</p>
              <input type="file" id="wsFileInput2" multiple style="display:none" />
            </div>`
          : `<div class="files-grid" id="wsGrid">${works.map(w => fileCardHtml(w)).join("")}</div>
            <div class="file-empty" id="wsDrop" style="margin-top:14px;padding:24px">
              <div class="upicon">${I.upload}</div>
              <p>새 작업물을 끌어다 놓거나 <label for="wsFileInput3" class="browse">클릭해서 선택</label></p>
              <input type="file" id="wsFileInput3" multiple style="display:none" />
            </div>`}
      </div>
    `;
  }

  function bindPlanWorkspace(task, plan) {
    document.getElementById("ws-back").onclick = () => { openPlanId = null; renderTabBody(task); };
    document.getElementById("phCheck").onclick = () => togglePlanCompletion(plan);
    const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
    const update = async (updates) => {
      const { error } = await sb.from("plans").update(updates).eq("id", plan.id);
      if (error) toast(error.message);
    };
    bind("phMarkDone", () => update({ done: true, pending_review: false }));
    bind("phRequestReview", () => { update({ pending_review: true }); toast("관리자/대표에게 검토를 요청했어요"); });
    bind("phReopen", () => update({ done: false, pending_review: false }));
    bind("phCancelReview", () => update({ pending_review: false }));
    bind("phApprove", () => { update({ done: true, pending_review: false }); toast("완료 승인됐어요"); });
    bind("phReject", () => { update({ pending_review: false }); toast("반려했어요"); });
    bind("rbApprove", () => { update({ done: true, pending_review: false }); toast("완료 승인됐어요"); });
    bind("rbReject", () => { update({ pending_review: false }); toast("반려했어요"); });

    document.getElementById("phEdit").onclick = async () => {
      const next = prompt("계획 이름을 수정합니다", plan.text);
      if (next != null && next.trim()) {
        const { error } = await sb.from("plans").update({ text: next.trim() }).eq("id", plan.id);
        if (error) toast(error.message);
      }
    };
    document.getElementById("phDelete").onclick = async () => {
      if (!confirm("이 계획과 작업물을 모두 삭제할까요?")) return;
      const { error } = await sb.from("plans").delete().eq("id", plan.id);
      if (!error) { openPlanId = null; }
      else toast(error.message);
    };

    document.getElementById("primaryPicker").onclick = (e) => openAssigneePopover(e.currentTarget, "primary_assignee_id", plan);
    document.getElementById("secondaryPicker").onclick = (e) => openAssigneePopover(e.currentTarget, "secondary_assignee_id", plan);

    const handleFiles = (files) => Array.from(files).forEach(f => addFile(f, { task_id: task.id, plan_id: plan.id, kind: "work" }));
    ["wsFileInput", "wsFileInput2", "wsFileInput3"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.onchange = (e) => { handleFiles(e.target.files); e.target.value = ""; };
    });
    const drop = document.getElementById("wsDrop");
    if (drop) {
      ["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
      ["dragleave","drop"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
      drop.addEventListener("drop", (e) => handleFiles(e.dataTransfer.files));
    }

    document.querySelectorAll("#tabBody .file-card").forEach(el => {
      const id = el.dataset.id;
      const work = (plan.works || []).find(x => x.id === id);
      el.onclick = (e) => {
        if (e.target.closest(".file-card-actions")) return;
        openFile = { taskId: task.id, planId: plan.id, fileId: id };
        renderFileOverlay();
      };
      el.querySelector(".att-down").onclick = (e) => { e.stopPropagation(); downloadAttachment(work); };
      el.querySelector(".att-del").onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`"${work.name}" 작업물을 삭제할까요?`)) return;
        await deleteAttachment(work);
      };
    });
  }

  function openAssigneePopover(anchorEl, fieldKey, plan) {
    closeAssigneePopover();
    const popover = document.createElement("div");
    popover.className = "assignee-popover";
    popover.id = "assigneePopover";
    const rect = anchorEl.getBoundingClientRect();
    popover.style.top = `${window.scrollY + rect.bottom + 6}px`;
    popover.style.left = `${rect.left}px`;
    const currentVal = plan[fieldKey];
    popover.innerHTML = `
      ${state.members.map(m => `
        <div class="item ${m.id === currentVal ? "selected" : ""}" data-id="${m.id}">
          <span class="av-mini" style="background:${avatarColor(m.display_name)}">${initial(m.display_name)}</span>
          <span class="item-info">
            <div class="item-name">${escapeHtml(m.display_name)}</div>
            <div class="item-role">${roleLabel(m.role)}</div>
          </span>
        </div>`).join("")}
      ${currentVal ? '<div class="divider"></div><div class="item clear" data-id="">지정 해제</div>' : ""}
    `;
    document.body.appendChild(popover);
    popover.querySelectorAll(".item").forEach(it => {
      it.onclick = async () => {
        const newId = it.dataset.id || null;
        const { error } = await sb.from("plans").update({ [fieldKey]: newId }).eq("id", plan.id);
        if (error) toast(error.message);
        closeAssigneePopover();
      };
    });
    setTimeout(() => document.addEventListener("click", popoverOutsideClick, true), 0);
  }
  function closeAssigneePopover() {
    document.getElementById("assigneePopover")?.remove();
    document.removeEventListener("click", popoverOutsideClick, true);
  }
  function popoverOutsideClick(e) {
    if (!e.target.closest(".assignee-popover") && !e.target.closest(".assignee-pill")) closeAssigneePopover();
  }

  // ─────────── Files (reference) ───────────
  function renderFiles(task) {
    const empty = (task.attachments || []).length === 0;
    return `
      <div class="tab-intro">
        <span class="ti-ic">${I.info}</span>
        <div>
          <strong>참고 자료를 모아두는 곳이에요</strong>
          <div>작업 시작 전에 받아본 시안, 요구사항 문서, 가이드 같은 입력 자료를 올려주세요. 결과물(내가 만든 작업물)은 각 계획 안에서 관리해요.</div>
        </div>
      </div>
      <div class="files-tools">
        <div style="font-size:13px;color:var(--muted)">파일을 클릭하면 미리보기 + 자료에 대한 댓글을 남길 수 있어요</div>
        <label class="btn btn-dark btn-sm" for="fileInput">
          ${I.upload}<span>자료 추가</span>
          <input type="file" id="fileInput" multiple style="display:none" />
        </label>
      </div>
      ${empty
        ? `<div class="file-empty" id="fileDrop">
            <div class="upicon">${I.upload}</div>
            <p>참고 자료를 끌어다 놓거나 <label for="fileInput2" class="browse">클릭해서 선택</label></p>
            <p style="font-size:12px;color:var(--muted);margin-top:6px">파일당 최대 50MB</p>
            <input type="file" id="fileInput2" multiple style="display:none" />
          </div>`
        : `<div class="files-grid" id="filesGrid">${task.attachments.map(a => fileCardHtml(a)).join("")}</div>
          <div class="file-empty" id="fileDrop" style="margin-top:14px;padding:24px">
            <div class="upicon">${I.upload}</div>
            <p>자료를 끌어다 놓거나 <label for="fileInput3" class="browse">클릭해서 선택</label></p>
            <input type="file" id="fileInput3" multiple style="display:none" />
          </div>`}
    `;
  }

  function bindFiles(task) {
    const handleFiles = (files) => Array.from(files).forEach(f => addFile(f, { task_id: task.id, plan_id: null, kind: "reference" }));
    ["fileInput","fileInput2","fileInput3"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.onchange = (e) => { handleFiles(e.target.files); e.target.value = ""; };
    });
    const drop = document.getElementById("fileDrop");
    if (drop) {
      ["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
      ["dragleave","drop"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
      drop.addEventListener("drop", (e) => handleFiles(e.dataTransfer.files));
    }
    document.querySelectorAll("#tabBody .file-card").forEach(el => {
      const id = el.dataset.id;
      const att = (task.attachments || []).find(x => x.id === id);
      el.onclick = (e) => {
        if (e.target.closest(".file-card-actions")) return;
        openFile = { taskId: task.id, planId: null, fileId: id };
        renderFileOverlay();
      };
      el.querySelector(".att-down").onclick = (e) => { e.stopPropagation(); downloadAttachment(att); };
      el.querySelector(".att-del").onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`"${att.name}" 자료를 삭제할까요?`)) return;
        await deleteAttachment(att);
      };
    });
  }

  // ─────────── File ops (Storage + DB) ───────────
  async function addFile(file, { task_id, plan_id, kind }) {
    if (file.size > 50 * 1024 * 1024) return toast(`${file.name}: 50MB 이하만 가능합니다`);
    const ext = fileExt(file.name);
    const path = `${task_id}/${crypto.randomUUID()}${ext ? "." + ext : ""}`;
    const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file, { contentType: file.type || undefined });
    if (upErr) return toast("업로드 실패: " + upErr.message);
    const { error: insErr } = await sb.from("attachments").insert({
      task_id, plan_id, kind,
      name: file.name, size: file.size,
      mime_type: file.type || "application/octet-stream",
      storage_path: path, uploaded_by: state.user.id
    });
    if (insErr) toast("DB 저장 실패: " + insErr.message);
  }

  async function deleteAttachment(att) {
    await sb.storage.from(BUCKET).remove([att.storage_path]);
    const { error } = await sb.from("attachments").delete().eq("id", att.id);
    if (error) toast(error.message);
  }

  async function getSignedUrl(att) {
    const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(att.storage_path, 60 * 60);
    if (error) { toast(error.message); return null; }
    return data.signedUrl;
  }

  async function downloadAttachment(att) {
    const url = await getSignedUrl(att);
    if (!url) return;
    const a = document.createElement("a");
    a.href = url; a.download = att.name;
    document.body.appendChild(a); a.click(); a.remove();
  }

  function fileCardHtml(a) {
    const kind = fileKind(a);
    const ext = fileExt(a.name) || kind;
    const cmt = (a.comments || []).length;
    const open = (a.comments || []).filter(c => !c.resolved).length;
    let thumb;
    if (kind === "image") {
      thumb = `<span class="big-icon">${I.file}</span><span class="ext-pill">${escapeHtml(ext.toUpperCase())}</span>`;
      // Async load thumb
      setTimeout(async () => {
        const url = await getSignedUrl(a);
        if (!url) return;
        const card = document.querySelector(`.file-card[data-id="${a.id}"] .file-thumb`);
        if (card) card.innerHTML = `<img src="${url}" alt="" />`;
      }, 50);
    } else if (kind === "pdf") {
      thumb = `<span class="big-icon">${I.file}</span><span class="ext-pill">PDF</span>`;
    } else {
      thumb = `<span class="big-icon">${I.file}</span><span class="ext-pill">${escapeHtml(ext.toUpperCase())}</span>`;
    }
    return `
      <div class="file-card" data-id="${a.id}">
        <div class="file-thumb">${thumb}</div>
        <div class="file-card-actions">
          <button class="icon-btn att-down" title="다운로드">${I.download}</button>
          <button class="icon-btn att-del" title="삭제">${I.trash}</button>
        </div>
        <div class="file-card-body">
          <div class="file-card-title">${escapeHtml(a.name)}</div>
          <div class="file-card-meta">
            <span>${fmtSize(a.size)}</span>
            ${cmt > 0
              ? `<span class="cmt-count">${I.chat}${open > 0 ? `${open} 미해결` : `${cmt} 모두 해결`}</span>`
              : `<span>${I.eye} 미리보기</span>`}
          </div>
        </div>
      </div>`;
  }

  // ─────────── File overlay ───────────
  function getOpenFile() {
    if (!openFile) return null;
    const task = state.tasks.find(t => t.id === openFile.taskId);
    if (!task) return null;
    if (openFile.planId) {
      const plan = (task.plans || []).find(p => p.id === openFile.planId);
      const file = plan?.works?.find(w => w.id === openFile.fileId);
      return file ? { file, contextLabel: `작업물 · ${plan.text}`, isWork: true } : null;
    }
    const file = (task.attachments || []).find(a => a.id === openFile.fileId);
    return file ? { file, contextLabel: "참고 자료", isWork: false } : null;
  }

  async function renderFileOverlay() {
    const existing = document.getElementById("fileOverlay");
    if (existing) existing.remove();
    if (!openFile) return;
    const ctx = getOpenFile();
    if (!ctx) { openFile = null; return; }
    const { file: att, contextLabel, isWork } = ctx;
    const kind = fileKind(att);
    const url = await getSignedUrl(att);
    let preview = "";
    if (!url) preview = `<div class="file-preview-empty"><div class="big-icon">${I.file}</div><div>파일을 불러올 수 없습니다</div></div>`;
    else if (kind === "image") preview = `<img src="${url}" alt="${escapeHtml(att.name)}" />`;
    else if (kind === "pdf") preview = `<iframe src="${url}" title="${escapeHtml(att.name)}"></iframe>`;
    else if (kind === "text") {
      try {
        const text = await (await fetch(url)).text();
        preview = `<pre>${escapeHtml(text)}</pre>`;
      } catch { preview = `<div class="file-preview-empty">불러오기 실패</div>`; }
    } else {
      preview = `<div class="file-preview-empty">
        <div class="big-icon">${I.file}</div>
        <div style="font-weight:600;color:var(--text);font-size:14px;margin-bottom:4px">${escapeHtml(att.name)}</div>
        <div style="font-size:12.5px">이 형식은 미리보기를 지원하지 않습니다.<br>다운로드해서 확인해주세요.</div>
      </div>`;
    }

    const cm = att.comments || [];
    const filtered = cm.filter(c => commentFilter === "open" ? !c.resolved : commentFilter === "resolved" ? c.resolved : true);
    const openCount = cm.filter(c => !c.resolved).length;
    const numberMap = new Map();
    cm.forEach((c, i) => numberMap.set(c.id, i + 1));

    const cmList = filtered.length
      ? filtered.slice().reverse().map(c => {
          const num = numberMap.get(c.id);
          return `
          <li class="com-item ${c.resolved ? "resolved" : ""}" data-id="${c.id}">
            ${c.pin_x != null ? `<span class="com-pin-num"><span>${num}</span></span>` : `<span style="width:22px;flex-shrink:0"></span>`}
            <div class="com-body">
              <div class="com-head">
                <span class="com-name-wrap"><span class="com-name">${escapeHtml(c.author_name)}</span></span>
                <span style="display:flex;align-items:center;gap:6px">
                  <span class="com-time">${fmtDateTime(c.created_at)}</span>
                  <button class="btn-icon-sm fc-del" title="삭제">${I.x}</button>
                </span>
              </div>
              <div class="com-text">${escapeHtml(c.body)}</div>
            </div>
            <button class="com-resolve" title="${c.resolved ? "해결 취소" : "해결됨으로 표시"}">${I.check}</button>
          </li>`;
        }).join("")
      : '<li class="empty-cm">표시할 코멘트가 없어요</li>';

    const overlay = document.createElement("div");
    overlay.id = "fileOverlay";
    overlay.className = "file-overlay";
    overlay.innerHTML = `
      <div class="file-modal" role="dialog">
        <div class="file-modal-head">
          <button class="btn btn-sm" id="fcBack">${I.arrow}뒤로</button>

          <span class="file-name">${escapeHtml(att.name)}</span>
          <span class="file-meta-text">${fmtSize(att.size)}</span>
          <button class="btn btn-sm" id="fcDown">${I.download}다운로드</button>
          <button class="btn-icon-sm" id="fcClose" title="닫기 (Esc)">${I.x}</button>
        </div>
        <div class="file-preview-area">
          ${preview}
          <div class="pin-layer" id="pinLayer"></div>
        </div>
        <aside class="file-comments-pane">
          <div class="file-comments-head">
            <div>
              <h3>${isWork ? "이 작업물에 대한 피드백" : "이 자료에 대한 의견"}</h3>
              <div class="sub">${cm.length}개 (미해결 ${openCount})</div>
            </div>
            <div class="filter-tabs">
              <button class="${commentFilter === "all" ? "active" : ""}" data-f="all">전체</button>
              <button class="${commentFilter === "open" ? "active" : ""}" data-f="open">미해결</button>
              <button class="${commentFilter === "resolved" ? "active" : ""}" data-f="resolved">해결</button>
            </div>
          </div>
          <ul class="file-comments-list">${cmList}</ul>
          <div class="file-comments-form">
            ${pendingPin ? `<div class="pending-pin-bar">${I.pin} <span>이 위치에 핀이 찍혔어요</span><button id="clearPin">제거</button></div>` : ""}
            <textarea id="fcText" placeholder="${isWork ? "어떤 점을 다듬으면 좋을지 알려주세요" : "자료에 대한 의견을 남겨주세요"}"></textarea>
            <div class="row">
              <button class="pin-drag-btn ${pendingPin ? "has-pin" : ""}" id="pinDragBtn" title="버튼을 작업물 위로 끌어다 놓으세요">
                ${I.pin} ${pendingPin ? "위치 지정됨" : "위치 지정"}
              </button>
              <button class="btn btn-dark btn-sm" id="fcSubmit" style="margin-left:auto">의견 남기기</button>
            </div>
          </div>
        </aside>
      </div>
    `;
    document.body.appendChild(overlay);
    renderPins(att, numberMap);

    const close = () => { openFile = null; pendingPin = null; overlay.remove(); };
    document.getElementById("fcBack").onclick = close;
    document.getElementById("fcClose").onclick = close;
    overlay.onclick = (e) => { if (e.target === overlay) close(); };
    document.getElementById("fcDown").onclick = () => downloadAttachment(att);
    document.getElementById("fcSubmit").onclick = async () => {
      const text = document.getElementById("fcText").value.trim();
      if (!text) return toast("내용을 입력해주세요");
      const task = state.tasks.find(t => t.id === openFile.taskId);
      const insert = {
        org_id: state.org.id,
        target_type: "attachment",
        attachment_id: att.id,
        task_id: task.id,
        author_id: state.user.id,
        author_name: currentName(),
        body: text,
        pin_x: pendingPin?.x ?? null,
        pin_y: pendingPin?.y ?? null,
      };
      const { error } = await sb.from("comments").insert(insert);
      if (error) return toast(error.message);
      pendingPin = null;
      document.getElementById("fcText").value = "";
    };
    overlay.querySelectorAll(".filter-tabs button").forEach(btn => {
      btn.onclick = () => { commentFilter = btn.dataset.f; renderFileOverlay(); };
    });
    overlay.querySelectorAll(".com-item").forEach(el => {
      const id = el.dataset.id;
      const c = (att.comments || []).find(x => x.id === id);
      el.querySelector(".com-resolve").onclick = async (e) => {
        e.stopPropagation();
        const updates = c.resolved
          ? { resolved: false, resolved_by: null, resolved_at: null }
          : { resolved: true, resolved_by: state.user.id, resolved_at: new Date().toISOString() };
        const { error } = await sb.from("comments").update(updates).eq("id", id);
        if (error) toast(error.message);
      };
      el.querySelector(".fc-del").onclick = async () => {
        const { error } = await sb.from("comments").delete().eq("id", id);
        if (error) toast(error.message);
      };
      el.addEventListener("mouseenter", () => {
        document.querySelectorAll(".preview-pin").forEach(p => p.classList.add("dim"));
        const pin = document.querySelector(`.preview-pin[data-id="${id}"]`);
        if (pin) { pin.classList.remove("dim"); pin.classList.add("highlight"); }
      });
      el.addEventListener("mouseleave", () => {
        document.querySelectorAll(".preview-pin").forEach(p => p.classList.remove("dim", "highlight"));
      });
    });
    document.getElementById("clearPin")?.addEventListener("click", () => { pendingPin = null; renderFileOverlay(); });
    const pinBtn = document.getElementById("pinDragBtn");
    pinBtn.addEventListener("mousedown", (e) => { e.preventDefault(); startPinDrag(e); });

    if (!window._escListener) {
      window._escListener = (e) => {
        if (e.key === "Escape") {
          if (document.getElementById("assigneePopover")) closeAssigneePopover();
          else if (openFile) close();
        }
      };
      document.addEventListener("keydown", window._escListener);
    }
  }

  function renderPins(att, numberMap) {
    const layer = document.getElementById("pinLayer");
    if (!layer) return;
    layer.innerHTML = "";
    (att.comments || []).forEach(c => {
      if (c.pin_x == null) return;
      const num = numberMap.get(c.id);
      const pin = document.createElement("div");
      pin.className = `preview-pin ${c.resolved ? "resolved" : ""}`;
      pin.dataset.id = c.id;
      pin.style.left = `${c.pin_x * 100}%`;
      pin.style.top = `${c.pin_y * 100}%`;
      pin.innerHTML = `<div class="pin-tail"></div><div class="pin-head"><span>${num}</span></div>`;
      pin.title = `${c.author_name}: ${c.body}`;
      layer.appendChild(pin);
    });
    if (pendingPin) {
      const pin = document.createElement("div");
      pin.className = "preview-pin pending";
      pin.style.left = `${pendingPin.x * 100}%`;
      pin.style.top = `${pendingPin.y * 100}%`;
      pin.innerHTML = `<div class="pin-tail"></div><div class="pin-head"><span>+</span></div>`;
      layer.appendChild(pin);
    }
  }

  function startPinDrag(startEvent) {
    const startBtn = document.getElementById("pinDragBtn");
    const r = startBtn.getBoundingClientRect();
    const ox = r.left + r.width / 2;
    const oy = r.top + r.height / 2;
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "pin-drag-svg");
    svg.innerHTML = `
      <line x1="${ox}" y1="${oy}" x2="${startEvent.clientX}" y2="${startEvent.clientY}" stroke="#d94e2a" stroke-width="2" stroke-dasharray="6 5"/>
      <circle cx="${ox}" cy="${oy}" r="5" fill="#d94e2a"/>
      <circle id="dragHead" cx="${startEvent.clientX}" cy="${startEvent.clientY}" r="9" fill="#d94e2a" stroke="#fff" stroke-width="2.5"/>
    `;
    document.body.appendChild(svg);
    const capture = document.createElement("div");
    capture.style.cssText = "position:fixed;inset:0;cursor:crosshair;z-index:249;";
    document.body.appendChild(capture);
    const line = svg.querySelector("line");
    const head = svg.querySelector("#dragHead");
    const preview = document.querySelector(".file-preview-area");
    const onMove = (e) => {
      line.setAttribute("x2", e.clientX);
      line.setAttribute("y2", e.clientY);
      head.setAttribute("cx", e.clientX);
      head.setAttribute("cy", e.clientY);
      const pr = preview.getBoundingClientRect();
      const inside = e.clientX >= pr.left && e.clientX <= pr.right && e.clientY >= pr.top && e.clientY <= pr.bottom;
      preview.style.outline = inside ? "2px solid var(--accent)" : "";
      preview.style.outlineOffset = "-2px";
      head.setAttribute("fill", inside ? "#d94e2a" : "#9ca3af");
    };
    const onUp = (e) => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      svg.remove(); capture.remove();
      preview.style.outline = "";
      const pr = preview.getBoundingClientRect();
      const inside = e.clientX >= pr.left && e.clientX <= pr.right && e.clientY >= pr.top && e.clientY <= pr.bottom;
      if (inside) {
        pendingPin = { x: (e.clientX - pr.left) / pr.width, y: (e.clientY - pr.top) / pr.height };
        renderFileOverlay();
        document.getElementById("fcText")?.focus();
      }
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }

    modalEditingId = task ? task.id : null;
    document.getElementById("modalTitle").textContent = task ? "작업 수정" : "새 작업 만들기";
    document.getElementById("modalTaskTitle").value = task?.title || "";
    document.getElementById("modalTaskDesc").value = task?.description || "";

  async function saveTaskModal() {
    const title = document.getElementById("modalTaskTitle").value.trim();
    if (!title) return toast("제목을 입력해주세요");
    const desc = document.getElementById("modalTaskDesc").value.trim();
    const due = document.getElementById("modalTaskDue").value || null;
    if (modalEditingId) {
      const { error } = await sb.from("tasks").update({ title, description: desc, due_date: due }).eq("id", modalEditingId);
      if (error) return toast(error.message);
    } else {
      const { data, error } = await sb.from("tasks").insert({
        org_id: state.org.id, title, description: desc, due_date: due, created_by: state.user.id
      }).select().single();
      if (error) return toast(error.message);
      selectedId = data.id;
      currentTab = "overview"; openPlanId = null;
      await loadTaskDeep(data.id);
    }
    closeTaskModal();

    closeMemberModal();
    toast("회사 설정을 저장했어요");
  };
  document.getElementById("signOutBtn").onclick = async () => {
    if (activeChannel) sb.removeChannel(activeChannel);
    if (activeTaskChannel) sb.removeChannel(activeTaskChannel);
    await sb.auth.signOut();
    closeMemberModal();
  };
  document.getElementById("orgIdCode").addEventListener("click", async () => {
    if (!state.org?.id) return;
    try { await navigator.clipboard.writeText(state.org.id); toast("회사 ID를 복사했어요"); }
    catch { /* noop */ }
  });

  // ─────────── Bootstrap ───────────
  async function bootstrapAfterAuth() {
    state.orgs = await loadOrgs();
    if (state.orgs.length === 0) { renderOrgCreate(); return; }
    await selectOrg(state.orgs[0].id);
    hideGate();
    renderAll();
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      state.user = session.user;
      await bootstrapAfterAuth();
    } else {
      renderLogin();
    }
    sb.auth.onAuthStateChange(async (_event, session) => {
      if (session?.user && session.user.id !== state.user?.id) {
        state.user = session.user;
        await bootstrapAfterAuth();
      } else if (!session) {
        state.user = null;
        if (activeChannel) sb.removeChannel(activeChannel);
        if (activeTaskChannel) sb.removeChannel(activeTaskChannel);
        renderLogin();
      }
    });
  }
  init();
</script>
</body>
</html>
