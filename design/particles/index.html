<!doctype html><html lang="ko"><head><meta charset="utf-8"/>
<title>NEOIX three.js</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&display=swap" rel="stylesheet">
<style>*{margin:0}body{background:#04040a;overflow:hidden;font-family:Archivo,system-ui,sans-serif}
#c{position:fixed;inset:0}.t{position:fixed;top:40%;left:8%;z-index:2;color:#fff}
h1{font-size:clamp(44px,7vw,88px);font-weight:900;letter-spacing:-.03em;margin:0;line-height:.95;
text-shadow:0 0 40px rgba(90,120,255,.5)}.s{color:#aab;margin-top:16px;font-size:20px;font-family:'Pretendard Variable',sans-serif}</style>
<script type="importmap">{"imports":{"three":"https://esm.sh/three@0.160.0",
"three/addons/":"https://esm.sh/three@0.160.0/examples/jsm/"}}</script></head>
<body>
<canvas id="c"></canvas>
<div class="t"><h1>NEOIX<br>2026</h1><div class="s">AI &middot; DESIGN &middot; FUTURE &middot; SEOUL</div></div>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer=new THREE.WebGLRenderer({canvas:c,antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,100);cam.position.z=14;

const N=5000,pos=new Float32Array(N*3),col=new Float32Array(N*3);
const cA=new THREE.Color(0x2b6bff),cB=new THREE.Color(0xa64bff);
for(let i=0;i<N;i++){const r=8+Math.random()*4,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
pos[i*3]=r*Math.sin(p)*Math.cos(t);pos[i*3+1]=r*Math.sin(p)*Math.sin(t);pos[i*3+2]=r*Math.cos(p);
const c=cA.clone().lerp(cB,Math.random());col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;}
const g=new THREE.BufferGeometry();
g.setAttribute('position',new THREE.BufferAttribute(pos,3));
g.setAttribute('color',new THREE.BufferAttribute(col,3));
const mat=new THREE.PointsMaterial({size:.08,vertexColors:true,transparent:true,opacity:.9,blending:THREE.AdditiveBlending});
const pts=new THREE.Points(g,mat);scene.add(pts);

const comp=new EffectComposer(renderer);
comp.addPass(new RenderPass(scene,cam));
comp.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.1,.6,.1));

function loop(t){pts.rotation.y=t*0.00008;pts.rotation.x=t*0.00004;comp.render();requestAnimationFrame(loop);}
loop(0);
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);comp.setSize(innerWidth,innerHeight);});
</script></body></html>
