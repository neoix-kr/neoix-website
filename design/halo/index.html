<!doctype html><html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NEOIX 2026 — HALO</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#0a0418;color:#fff;font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif}
  #hero{height:100vh;position:relative;overflow:hidden}
  .hero-inner{position:absolute;top:40%;left:50%;transform:translateX(-50%);z-index:2;text-align:center;width:100%}
  h1{font-family:Archivo,sans-serif;font-size:clamp(44px,8vw,84px);font-weight:900;letter-spacing:-.03em;margin:0;line-height:1}
  .sub{color:#cbb6ff;font-size:clamp(16px,2vw,22px);margin-top:18px}
  section{padding:120px 8%;font-size:32px;font-weight:700}
  .reveal{opacity:0;transform:translateY(40px)}
</style></head>
<body>
  <div id="hero"><div class="hero-inner">
    <h1>NEOIX 2026</h1>
    <div class="sub">AI &middot; DESIGN &middot; FUTURE</div>
  </div></div>
  <section class="reveal">세션 소개</section>
  <section class="reveal">연사 라인업</section>
  <section class="reveal">좌석 예약 &rarr;</section>
<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches || innerWidth < 768;
  if(!reduce){
    VANTA.HALO({el:"#hero",baseColor:0x5b2bff,backgroundColor:0x0a0418,amplitudeFactor:2.2,size:1.6});
  }
  gsap.registerPlugin(ScrollTrigger);
  gsap.utils.toArray('.reveal').forEach(el=>{
    gsap.to(el,{opacity:1,y:0,duration:1,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 80%'}});
  });
</script>
</body></html>
