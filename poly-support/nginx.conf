server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;
    # ALB(HTTPS 종단) 뒤라 스킴을 모름 — 상대경로 리다이렉트로 https 유지
    absolute_redirect off;

    # ALB 헬스체크
    location = /support/health {
        default_type text/plain;
        return 200 'ok';
    }

    # 유니버설 링크 AASA — 반드시 application/json, 리다이렉트 금지
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "max-age=3600";
    }

    # 이니시스 결제창 returnUrl은 POST로 들어옴 — 정적파일 405를 200으로 되살림
    location = /support/demo-complete.html {
        error_page 405 =200 $uri;
    }

    location /support {
        try_files $uri $uri/ /support/index.html;
    }

    # 폴리 프로필 (poly-profile) — 같은 컨테이너에 얹음(piggyback). 소스: poly-profile/site
    location = /profile/health {
        default_type text/plain;
        return 200 'ok';
    }
    location /profile {
        try_files $uri $uri/ /profile/index.html;
    }
}
