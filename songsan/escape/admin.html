<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>믿음의 항해 — 관리자 창</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{--sea:#0B1826;--sea2:#122A42;--line:rgba(233,237,240,.12);
    --chalk:#E9EDF0;--dim:#9AA7B2;--brass:#C29A2B;--brass-lt:#E4C463;--good:#7FD4BC;--bad:#D98A7A}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Jua',sans-serif;background:linear-gradient(180deg,#0B1826,#122A42 60%,#16324E);
    color:var(--chalk);min-height:100vh;padding:18px}
  .wrap{max-width:1180px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  h1{font-size:26px;letter-spacing:2px}
  .sub{font-family:'Gowun Batang',serif;font-size:14px;color:var(--dim)}
  .grow{flex:1}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tabs button{font-family:inherit;font-size:15px;color:var(--dim);background:rgba(233,237,240,.05);
    border:1px solid var(--line);border-radius:9px;padding:10px 18px;cursor:pointer}
  .tabs button.on{color:#241C06;background:var(--brass);border-color:var(--brass)}
  .card{background:rgba(233,237,240,.05);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
  .k{font-size:13px;letter-spacing:2px;color:var(--brass-lt);margin-bottom:10px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:rgba(233,237,240,.05);border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center}
  .stat span{display:block;font-family:'Gowun Batang',serif;font-size:12px;color:var(--dim)}
  .stat b{display:block;margin-top:5px;font-size:25px;color:var(--brass-lt);font-weight:400}
  .stat b i{font-style:normal;font-size:13px;color:var(--dim)}
  .bar{height:7px;border-radius:4px;background:rgba(233,237,240,.1);margin-top:12px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#8A6C14,var(--brass-lt))}
  table{width:100%;border-collapse:collapse;font-family:'Gowun Batang',serif;font-size:14px}
  th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;vertical-align:top}
  th{font-family:'Jua';font-weight:400;color:var(--brass-lt);font-size:13px;letter-spacing:1px}
  td b{color:var(--brass-lt);font-weight:400}
  .pill{display:inline-block;font-size:12px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .pill.on{background:var(--brass);border-color:var(--brass);color:#241C06}
  .pill.ok{border-color:rgba(127,212,188,.5);color:var(--good)}
  .g{margin-top:13px;font-family:'Gowun Batang',serif;font-size:15px;line-height:1.8}
  .g em{display:block;font-family:'Jua';font-style:normal;font-size:12px;letter-spacing:2px;color:var(--brass-lt);margin-bottom:3px}
  .g.word{border-top:1px dashed var(--line);padding-top:11px;color:var(--brass-lt)}
  details{border:1px solid var(--line);border-radius:10px;margin-bottom:9px;background:rgba(233,237,240,.04)}
  summary{padding:12px 15px;cursor:pointer;font-size:16px;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:'▸ ';color:var(--brass)}
  details[open] summary::before{content:'▾ '}
  details .body{padding:0 15px 15px}
  .note{font-family:'Gowun Batang',serif;font-size:14px;line-height:1.7;color:var(--dim)}
  .warn{background:rgba(181,80,63,.14);border:1px solid rgba(181,80,63,.5);border-radius:10px;padding:13px 15px;
    font-family:'Gowun Batang',serif;font-size:14px;line-height:1.7;margin-top:12px}
  .warn b{color:#E4A091}
  a.btn{display:inline-block;font-family:inherit;font-size:15px;text-decoration:none;color:#241C06;
    background:var(--brass);border-radius:9px;padding:10px 18px;margin-right:8px;margin-top:6px}
  a.btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--line)}
  .gate{max-width:400px;margin:14vh auto;text-align:center}
  .gate input{width:100%;font-family:'Jua';font-size:30px;letter-spacing:12px;text-align:center;
    background:rgba(233,237,240,.07);border:1px solid var(--line);border-radius:11px;padding:15px;color:var(--chalk);margin-top:16px}
  .gate input:focus{outline:none;border-color:var(--brass)}
  .err{color:var(--bad);font-family:'Gowun Batang',serif;font-size:14px;margin-top:10px;min-height:20px}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--good);animation:blink 1.6s infinite}
  @keyframes blink{50%{opacity:.25}}
</style>
</head>
<body>

<div id="gate" class="gate">
  <h1>관리자 창</h1>
  <p class="sub" style="margin-top:8px">믿음의 항해 · 인솔 교사용</p>
  <input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="····" autocomplete="off">
  <div class="err" id="err"></div>
</div>

<div class="wrap" id="app" style="display:none">
  <header>
    <h1>관리자 창</h1>
    <span class="sub">믿음의 항해 · 인솔 교사용</span>
    <span class="grow"></span>
    <span class="live"><i></i><span id="liveTxt">이 기기의 게임 상태를 2초마다 읽는 중</span></span>
  </header>

  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>

<script src="teach.js"></script>
<script>
const PIN='3574', LS_KEY='faithVoyage_v3';
const SB_URL='https://nroddjekdjwnwguwkudl.supabase.co';
const SB_KEY='sb_publishable_Uygr7NmVn1wmqopNrb4FRw_CRWw7Xeg';
let ROWS=[], SYNCED=null, SYNCERR='';
function fetchTeams(){
  return fetch(SB_URL+'/rest/v1/escape_progress?select=*&order=solved.desc,elapsed_ms.asc',
    {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(j=>{ ROWS=j; SYNCED=new Date(); SYNCERR=''; })
    .catch(e=>{ SYNCERR='서버 연결 실패 ('+e+')'; });
}

/* 자물쇠 — index.html의 phys 코드와 반드시 일치해야 한다 */
const LOCKS=[
  {name:'승선 명부함', room:'갑판',   code:'2031', verse:'요 20:31',
   parts:[['성경','2'],['성경','0'],['현장','3'],['패드','1']]},
  {name:'출항 명령서', room:'선장실', code:'0822', verse:'눅 8:22',
   parts:[['교사','0'],['패드','8'],['현장','2'],['현장','2']]},
  {name:'사슬 자물쇠', room:'화물칸', code:'0829', verse:'눅 8:29',
   parts:[['패드','0'],['패드','8'],['교사','2'],['현장','9']]},
  {name:'선원 명부 궤',room:'선원실', code:'0854', verse:'눅 8:54',
   parts:[['패드','0'],['패드','8'],['현장','5'],['성경','4']]},
  {name:'등대 철문',  room:'등대',   code:'0901', verse:'눅 9:1',
   parts:[['패드','0'],['패드','9'],['교사','0'],['현장','1']]},
];
const TEAM_LOCKS=[
  {name:'조타실 항해궤', codes:['8624','5137','7412']},
  {name:'비밀선창 보물궤',codes:['3327','6085','2914']},
];
const TEAMS=['베드로호','야고보호','요한호'];
const ACT_NAMES=['부두','출항','폭풍','무덤 섬','돌아온 항구','등대'];
const PZ_ORDER=['p1','p2','p3','p4','p5','p6','p7','p8','p9','p10','p11','p12','p13'];
const PZ_TITLE={p1:'보이지 않는 잉크',p2:'도둑이 남긴 쪽지',p3:'항해사의 해도',p4:'폭풍 속 무전',
  p5:'물에 젖은 항해일지',p6:'이천의 비밀',p7:'네 개의 다이얼',p8:'거꾸로 쓰인 편지',
  p9:'군중 속의 손',p10:'레핀의 방',p11:'소녀를 깨운 말',p12:'파송의 신호기',p13:'등대 점화'};

let TAB='live', S=null;
function load(){ try{ const r=localStorage.getItem(LS_KEY); S=r?JSON.parse(r):null; }catch(e){ S=null; } }
function fmt(ms){ const t=Math.max(0,Math.floor(ms/1000)); return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); }
function elapsed(){ if(!S||!S.startTs) return 0; return (S.finishTs||Date.now())-S.startTs+(S.penaltyMin||0)*60000; }
function solvedN(){ return S&&S.solved?Object.keys(S.solved).length:0; }

const TABS=[['live','현황'],['guide','관문 해설'],['codes','미션표'],['prep','준비물'],['games','미니게임']];

function render(){
  document.getElementById('tabs').innerHTML=TABS.map(([k,n])=>
    `<button class="${TAB===k?'on':''}" onclick="go('${k}')">${n}</button>`).join('');
  document.getElementById('view').innerHTML=({live:vLive,guide:vGuide,codes:vCodes,prep:vPrep,games:vGames})[TAB]();
}
function go(t){ TAB=t; if(t==='live') fetchTeams().then(render); else render(); }
function refresh(){ fetchTeams().then(render); }

function agoTxt(t){
  if(!t) return '-';
  const d=Math.floor((Date.now()-new Date(t))/1000);
  if(d<20) return '방금'; if(d<60) return d+'초 전';
  if(d<3600) return Math.floor(d/60)+'분 전';
  return Math.floor(d/3600)+'시간 전';
}
function stale(t){ return !t || (Date.now()-new Date(t))>120000; }

function vLive(){
  const shipMap={anchor:'닻',sail:'돛',helm:'침로',trim:'하중'};
  let h=`<div class="card" style="padding:13px 16px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="k" style="margin:0">전 팀 현황</span>
      <span class="grow"></span>
      <span class="note" style="font-size:13px">${SYNCERR?('<span style="color:#D98A7A">'+SYNCERR+'</span>'):('마지막 갱신 '+(SYNCED?SYNCED.toLocaleTimeString('ko-KR'):'-'))}</span>
      <button onclick="refresh()" style="font-family:inherit;font-size:13px;color:#241C06;background:var(--brass);border:0;border-radius:8px;padding:7px 14px;cursor:pointer">새로고침</button>
    </div></div>`;

  if(SYNCERR && !ROWS.length){
    h+=`<div class="warn">서버에서 팀 현황을 못 읽었습니다.<br>
      <b>escape-progress-setup.sql</b>을 Supabase에 실행했는지 확인하세요.
      아직 실행 전이면 아래 <b>이 기기</b> 현황만 보입니다.</div>`;
  }
  if(!ROWS.length && !SYNCERR){
    h+=`<div class="card"><p class="note">아직 올라온 팀이 없습니다.
      팀 패드에서 게임을 시작하면 15초 안에 여기 나타납니다.</p></div>`;
  }

  // 팀 카드 — 한눈에 비교
  if(ROWS.length){
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:12px;margin-bottom:12px">`;
    ROWS.forEach((r,idx)=>{
      const pct=Math.round((r.solved||0)/13*100);
      const st=stale(r.updated_at);
      const rank=r.finished?'🏁':(idx===0?'1위':(idx+1)+'위');
      h+=`<div class="card" style="margin:0;${st?'opacity:.55':''}">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:19px">${r.team_name}</span>
          <span class="pill ${r.finished?'on':''}">${rank}</span>
          <span class="grow"></span>
          <span class="note" style="font-size:12px">${st?'⚠ ':''}${agoTxt(r.updated_at)}</span>
        </div>
        <div class="bar" style="margin-top:10px"><i style="width:${pct}%"></i></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:11px">
          <div class="stat" style="padding:9px"><span>경과</span><b style="font-size:19px">${fmt(r.elapsed_ms||0)}</b></div>
          <div class="stat" style="padding:9px"><span>진행</span><b style="font-size:19px">${r.solved||0}<i>/13</i></b></div>
          <div class="stat" style="padding:9px"><span>막</span><b style="font-size:19px">${r.act||0}</b></div>
          <div class="stat" style="padding:9px"><span>벌점</span><b style="font-size:19px">${r.penalty_min||0}<i>분</i></b></div>
        </div>
        <table style="margin-top:10px">
          <tr><th style="width:78px">위치</th><td>${ACT_NAMES[r.act]||'-'}</td></tr>
          <tr><th>배 조작</th><td>${Object.keys(shipMap).map(k=>
              `<span class="pill ${(r.ship||[]).includes(k)?'ok':''}">${shipMap[k]}</span>`).join(' ')}</td></tr>
          <tr><th>힌트·정답</th><td>${r.hints||0} · <b>${r.reveals||0}</b></td></tr>
          <tr><th>자물쇠</th><td>${(r.locks||[]).length}개 / 도구 ${(r.items||[]).length}개</td></tr>
          <tr><th>최근</th><td class="note" style="color:#E9EDF0">${r.last_event||'-'}</td></tr>
        </table>
      </div>`;
    });
    h+=`</div>`;

    // 관문별 진행 비교표
    h+=`<div class="card"><div class="k">관문별 진행 비교</div>
      <table><tr><th style="width:110px">팀</th>${PZ_ORDER.map(id=>`<th style="text-align:center" title="${PZ_TITLE[id]}">${id.slice(1)}</th>`).join('')}</tr>
      ${ROWS.map(r=>`<tr><td>${r.team_name}</td>${PZ_ORDER.map(id=>
        `<td style="text-align:center">${(r.solved_ids||[]).includes(id)?'<span style="color:var(--good)">●</span>':'<span style="color:#3A4756">○</span>'}</td>`).join('')}</tr>`).join('')}
      </table>
      <p class="note" style="margin-top:9px">● 해결 · ○ 미해결. 한 팀만 유독 막힌 관문이 보이면 그쪽에 교사를 보내세요.</p>
    </div>`;
  }

  // 이 기기 상세 (팀 패드에서 열었을 때)
  load();
  if(S && S.phase && S.phase!=='lobby'){
    h+=`<div class="card"><div class="k">이 기기 — ${S.teamName||'팀 미지정'} 상세</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${PZ_ORDER.map(id=>`<span class="pill ${S.solved&&S.solved[id]?'ok':''}">${id.slice(1)} ${PZ_TITLE[id]}</span>`).join('')}
      </div>
      <table style="margin-top:11px">
        <tr><th style="width:110px">연 자물쇠</th><td>${Object.keys(S.phys||{}).join(', ')||'없음'}</td></tr>
        <tr><th>확보 도구</th><td>${Object.keys(S.items||{}).filter(k=>S.items[k]).join(', ')||'없음'}</td></tr>
        <tr><th>비밀 선창</th><td>${(S.unlocked||{}).secret?'<b>열림</b>':'잠김'}</td></tr>
      </table>
      <table style="margin-top:11px">${(S.log||[]).slice(-8).reverse().map(l=>
        `<tr><td style="width:66px;color:#9AA7B2">${new Date(l.t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</td><td>${l.msg}</td></tr>`).join('')}</table>
    </div>`;
  }
  return h;
}

function vGuide(){
  return `<div class="card"><div class="k">인솔 교사용 관문 해설</div>
    <p class="note">학생이 “왜 그게 답이에요?”라고 물을 때 바로 답할 수 있게 정리했습니다.
    정답은 <b>말해주지 말고</b> ‘막힐 때’의 단계대로 밀어주세요.</p></div>
    ${PZ_ORDER.map(id=>{
      const t=(typeof TEACH!=='undefined')&&TEACH[id];
      if(!t) return '';
      const solved=S&&S.solved&&S.solved[id];
      return `<details${solved?'':''}>
        <summary>${id.slice(1)}. ${PZ_TITLE[id]} ${solved?'<span class="pill ok" style="margin-left:6px">해결</span>':''}</summary>
        <div class="body">
          <div class="g"><em>핵심</em>${t.core}</div>
          <div class="g"><em>정답과 근거</em>${t.answer}</div>
          <div class="g"><em>막힐 때</em>${t.stuck}</div>
          <div class="g word"><em>말씀 연결</em>${t.word}</div>
        </div></details>`;
    }).join('')}`;
}

function vCodes(){
  const M=[
    ['0','승선 서약','확인(팀)','갑판','넷이 서약문 낭독+제창, 각자 명부 서명','<b>선장</b>: 4인 고루 맡았나·마지막 행 함께 외쳤나 → 손등 스탬프','통과시키면 팀이 패드 확인'],
    ['1','출항 삭구','확인(교사)','선장실','4지점 매듭 각 1개 + 함께 돛 올림','<b>갑판장</b>: 매듭을 도해와 대조 검사 → <b>나무 십자가 지급</b>','매듭 4개 맞으면 통과'],
    ['2','폭풍 침로','<b>리듬</b>','조타실','빛 신호를 길·짧 리듬으로 재현','<b>신호수</b>: 복도끝 손전등으로 정확히 3회 발신. 정답 발화 금지','리듬 <b>길–짧–짧–길</b> (L S S L)'],
    ['3','사슬 끊기','확인(교사)','화물칸','서로의 종이 사슬을 끊어줌 + 십자가 세움','<b>거라사</b>: 4인 다 풀렸나 → <b>상륙 열쇠·기름·부싯돌 지급</b>','전원 풀리면 통과'],
    ['4','그 한 사람','<b>단어</b>','선원실','필름 4장 겹쳐 여인 드러냄','<b>선원</b>(유동): 정렬·광원만. 자기검증형','단어 <b>믿음</b> (눅 8:48)'],
    ['5','등대 점화','확인(교사)','등대','부품 조립 + 「예수를 바라보자」 선포','<b>등대지기</b>: 짐검사 후 LED 점등 → 다음 팀 파송','선포하면 통과'],
    ['—','보물궤(비밀)','<b>단어</b>','비밀선창','선장의 편지 맨 끝을 읽음','—','단어 <b>훈장</b>'],
  ];
  return `<div class="warn"><b>학생에게 보이지 않게 하세요.</b> 각 막의 통과 조건과 정답입니다. <b>숫자 코드는 없어졌습니다</b> — 막마다 방식이 다릅니다.</div>
  <div class="card"><div class="k">막별 미션 · 통과 조건</div>

  if(pin.value===PIN){
    document.getElementById('gate').style.display='none';

});
