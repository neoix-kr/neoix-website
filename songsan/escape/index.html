        <p style="font-size:16px;text-align:center">직접 지을 수도 있습니다</p>
        <div class="answer-row">
          <input class="answer-input" id="customTeam" maxlength="10" placeholder="예: 무적함대호">
        </div>
      </div>
      <button class="btn" onclick="UI.confirmTeam()">이 배로 출항 준비</button>
    </div>`;
    this._team='';
  },
  pickTeam(el,t){
    document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('on'));
    el.classList.add('on'); this._team=t;
    const ci=document.getElementById('customTeam'); if(ci) ci.value='';
  },
  confirmTeam(){
    const ci=document.getElementById('customTeam');
    const name=(ci&&ci.value.trim())||this._team;
    if(!name){ Info.show('팀 이름','<p class="desc">배 이름을 골라 주세요.</p>'); return; }
    Game.begin(name);
  },
  renderStory(root){
    root=root||document.getElementById('screen-root');
    const st=STAGES[S.stageIdx];
    const isFirst=S.stageIdx===0;
    root.innerHTML=`<div class="screen">
      <div style="margin-top:8px"><span class="tag onDark">항해일지 · ${st.chapter}</span></div>
      ${sceneHtml(SCENES[st.id], st.id==='prologue'?'prologue':st.id, st.id==='prologue'?'boat-bob':'')}
      <h2 class="story-title">${st.title}</h2>
      <p class="story-sermon">${st.sermon}</p>
      <div class="card"><p class="story-text">${st.story}</p>
      <p class="story-verse">${st.verse}</p></div>
      <button class="btn" onclick="${isFirst?'Game.startVoyage()':'Game.enterStage()'}">${isFirst?'출항 — 타이머 시작':'미션 시작'}</button>
      ${isFirst?'<p class="note">이 버튼을 누르는 순간부터 시간이 기록됩니다.<br>관리자 선생님의 출발 신호에 맞춰 누르세요.</p>':''}
    </div>`;
  },
  renderPlay(root){
    root=root||document.getElementById('screen-root');
    Morse.stop();
    Explore.closeModal();   // 사건 화면 위에 탐색 모달이 겹치지 않게
    const st=STAGES[S.stageIdx];
    const pz=st.puzzles[S.puzzleIdx];
    const myHints=S.hintTexts.filter(h=>h.puzzle===pz.id);
    let body='';
    const imgHtml = pz.img ? `<div class="pz-art"><img src="assets/${pz.img}.webp" alt="" loading="lazy" onerror="this.closest('.pz-art').style.display='none'"></div>` : '';
    const artHtml = imgHtml + (pz.art ? ART[pz.art]() : '') + (pz.paint ? paintingHtml(pz.paint[0], pz.paint[1]) : '') + (pz.custom ? CUSTOM[pz.custom]() : '');
    if(pz.type==='text'||pz.type==='number'){
      body=`${pz.verse?`<div class="verse-box">${pz.verse}</div>`:''}${artHtml}
      ${pz.toolNote?`<div class="tool-note">준비물: ${pz.toolNote}</div>`:''}
      <div class="answer-row">
        <input class="answer-input" id="ans" inputmode="${pz.type==='number'?'numeric':'text'}" placeholder="${pz.placeholder||'정답'}" onkeydown="if(event.key==='Enter')Puzzle.checkText()">
        <button class="check-btn" onclick="Puzzle.checkText()">확인</button>
      </div>`;
    }
    else if(pz.type==='multiinput'){
      body=`${pz.verse?`<div class="verse-box">${pz.verse.replace(/\[(①|②|③|④|⑤)\]/g,'<b>[$1____]</b>')}</div>`:''}${artHtml}
      ${pz.fields.map((f,i)=>`<div class="multi-row"><span class="multi-label">${f.label}</span><input class="answer-input" id="mf${i}" placeholder="${f.placeholder}"></div>`).join('')}
      <button class="btn ink small" onclick="Puzzle.checkMulti()">확인</button>`;
    }
    else if(pz.type==='dial'){
      body=`${artHtml}<div class="dial-wrap">
        ${pz.answerDial.map((_,d)=>`
          <div class="dial">
            <button class="dial-btn" onclick="Puzzle.spinDial(${d},-1)">▲</button>
            <div class="dial-window" id="dw${d}"></div>
            <div class="dial-name" id="dn${d}"></div>
            <button class="dial-btn" onclick="Puzzle.spinDial(${d},1)">▼</button>
          </div>`).join('')}
      </div>
      <button class="btn ink small" onclick="Puzzle.checkDial()">자물쇠 돌리기</button>`;
    }
    else if(pz.type==='meta'){
      const got=sealCount();
      const needChips=`<div class="need-chips">
        <div class="need-chip ${S.items.oil?'got':''}">${ITEMS.oil.icon} 기름통 ${S.items.oil?'확보':'미확보'}</div>
        <div class="need-chip ${S.items.flint?'got':''}">${ITEMS.flint.icon} 부싯돌 ${S.items.flint?'확보':'미확보'}</div>
      </div>`;
      body=needChips+`<div class="seal-row">
        ${SEAL_TEXTS.map((t,i)=>i<got?`<div class="seal-chip"><span class="ord">${i+1}번째</span><span class="tx">${t}</span></div>`:`<div class="seal-chip empty"><span class="tx">?</span></div>`).join('')}
      </div>
      ${pz.metaFields.map((f,i)=>`<div class="multi-row"><span class="multi-label" style="min-width:56px;font-size:14px">${f.label}</span><input class="answer-input" id="mf${i}" placeholder="${f.placeholder}"></div>`).join('')}
      <button class="btn ink small" onclick="Puzzle.checkMeta()">봉인 해제</button>`;
    }
    root.innerHTML=`<div class="screen">
      <div class="pz-head">
        <button class="pz-back" onclick="Game.backToShip()">← 배로 돌아가기</button>
        <p class="pz-stage">${(PZ_SPOT[pz.id]?ROOMS[PZ_SPOT[pz.id].split('.')[0]].name+' · ':'')}${ACTS[Math.max(0,actOf(pz.id))].name}</p>
        <h2 class="pz-title">${pz.title}</h2>
      </div>
      <div class="card" id="pzCard">
        <p class="pz-mission">${pz.mission}</p>
        ${pz.bible?`<p style="text-align:center;margin-top:10px;color:var(--ink-soft);font-size:13px;letter-spacing:1px"><svg class="ic" width="14" height="14" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7"><path d="M24 20 h40 a8 8 0 0 1 8 8 v52 h-44 a8 8 0 0 1 -8 -8 V24 a6 6 0 0 1 4 -4 Z"/><path d="M28 80 h44 M46 36 v20 M38 44 h16"/></svg> 성경책이 필요한 관문</p>`:''}
        ${(pz.type==='text'||pz.type==='number')?'':((pz.type==='multiinput'&&!pz.verse)?'':(pz.type==='multiinput')?'':artHtml)}
        ${body}
        <p class="feedback" id="fb"></p>
      </div>
      <div class="hint-bar">
        <button class="btn ghost" style="flex:1" onclick="Hint.request()"><svg class="ic" width="17" height="17" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="6"><path d="M40 12 h20 M36 20 h28 M34 20 c-6 8-8 14-8 24 0 20 10 34 24 34 s24-14 24-34 c0-10-2-16-8-24 M38 88 h24 M42 78 h16"/><path d="M50 36 c7 7 7 16 0 23 c-7-7-7-16 0-23 Z" fill="currentColor" stroke="none"/></svg> 💡 힌트 보기</button>
      </div>
      ${myHints.length?`<div class="hint-log">${myHints.map(h=>`<div class="hint-item">${h.level} · ${h.text}</div>`).join('')}</div>`:''}
    </div>`;
    Puzzle.init(pz);
    if(S.cooldownUntil>Date.now()){ this.lockAnswer(Math.ceil((S.cooldownUntil-Date.now())/1000)); }
  },
  lockAnswer(sec){
    const card=document.getElementById('pzCard');
    if(!card) return;
    card.style.pointerEvents='none'; card.style.opacity=.6;
    const fb=document.getElementById('fb');
    let left=sec;
    const iv=setInterval(()=>{
      left--;
      if(fb) fb.textContent=`${left}초 후 다시 도전할 수 있다.`;
      if(left<=0){ clearInterval(iv); card.style.pointerEvents=''; card.style.opacity=1; if(fb) fb.textContent='다시 도전.'; }
    },1000);
  },
  showMyHints(){
    if(!S||!S.hintTexts.length){ Info.show('받은 힌트','<p class="desc">아직 받은 힌트가 없습니다.</p>'); return; }
    Info.show('받은 힌트',S.hintTexts.map(h=>`<div class="hint-item">[${h.title}] ${h.level} · ${h.text}</div>`).join(''));
  },
  showSeals(){
    const got=sealCount();
    const chips=SEAL_TEXTS.map((t,i)=>i<got?`<div class="seal-chip"><span class="ord">${i+1}번째</span><span class="tx">${t}</span></div>`:`<div class="seal-chip empty"><span class="tx">?</span></div>`).join('');
    Info.show('모은 인장',`<div class="seal-row">${chips}</div><p class="desc" style="margin-top:12px">챕터의 모든 관문을 통과하면 인장을 얻는다.<br>인장은 마지막 봉인의 열쇠다.</p>`);
  },
  renderFinish(root){
    root=root||document.getElementById('screen-root');
    const total=this.finalMs();
    root.innerHTML=`<div class="screen">
      <div class="lh-scene"><img src="assets/finish.webp" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:2" onerror="this.style.display='none';this.nextElementSibling.classList.add('show')"><span class="scene-fb">${IC.lighthouse}</span></div>
      <h1 class="title" style="font-size:34px">등대에 불이 켜졌다</h1>
      <p class="subtitle">${S.teamName} · 항해 완료</p>
      <div class="card cert">
        <div style="position:absolute;right:16px;bottom:14px;width:64px;height:64px;transform:rotate(-12deg);z-index:2">${IC.seal}</div>
        <p class="cert-label">항 해 증 서</p>
        <p class="record-big">${this.fmt(total)}</p>
        <p class="note onPaper" style="margin-top:2px">최종 기록 = 걸린 시간 + 벌점</p>
        <p class="record-detail">
          걸린 시간 ${this.fmt(this.elapsedMs())}<br>
          힌트 벌점 +${S.penaltyMin}분<br>
          완주 시각 ${new Date(S.finishTs).toLocaleTimeString('ko-KR')}
        </p>
      </div>
      <div class="card dark" style="text-align:center">
        <p class="story-text" style="color:var(--chalk)">모든 봉인의 답은 처음부터 하나였다.<br><b style="color:var(--brass-lt)">예수를 바라보자.</b><br>진짜 믿음의 항해는 이제 시작이다.</p>
        <p class="story-verse" style="color:var(--chalk-dim);border-top-color:rgba(233,237,240,.15)">"믿음의 주요 또 온전하게 하시는 이인 예수를 바라보자" — 히브리서 12:2</p>
      </div>
      <p class="note">이 화면을 관리자 선생님께 보여 주세요</p>
    </div>`;
    Sound.fanfare();
    this.confetti();
  },
  confetti(){
    const colors=['#C29A2B','#E4C463','#9E3B2C','#3E7C6F','#F2E7CB'];
    for(let i=0;i<44;i++){
      const d=document.createElement('div');
      d.className='confetti';
      d.style.background=colors[i%colors.length];
      d.style.left=Math.random()*100+'vw';
      d.style.animationDuration=(2.6+Math.random()*2.6)+'s';
      d.style.animationDelay=(Math.random()*1.4)+'s';
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),6500);
    }
  },
};

/* ---------------- 문제 로직 ---------------- */
const Puzzle = {
  cur:null, dialPos:[],
  init(pz){
    this.cur=pz;
    if(pz.type==='dial'){ this.dialPos=pz.answerDial.map((_,i)=>[0,1,3,5][i%4]===pz.answerDial[i]?([0,1,3,5][i%4]+1)%pz.symbols.length:[0,1,3,5][i%4]); this.renderDials(); }
    if(pz.custom==='uvPermit') UVX.init();
    if(pz.custom==='thiefNote') ScratchX.init();
  },
  norm(s){ return (s||'').replace(/[\s\.\,\!\?:："“”'’·\-]/g,'').toUpperCase(); },
  checkText(){
    const el=document.getElementById('ans');
    const v=this.norm(el.value);
    if(!v) return;
    const ok=this.cur.answers.some(a=>this.norm(a)===v);
    if(ok){ Game.advance(); } else { Game.submitWrong(el); el.value=''; }
  },
  checkMulti(){
    const fs=this.cur.fields;
    let wrong=0, empty=0;
    fs.forEach((f,i)=>{
      const v=this.norm(document.getElementById('mf'+i).value);
      if(!v){ empty++; return; }
      if(!f.answers.some(a=>this.norm(a)===v)) wrong++;
    });
    if(empty){ document.getElementById('fb').textContent='빈칸이 남아 있다.'; return; }
    if(wrong===0) Game.advance();
    else { document.getElementById('fb').textContent=`${wrong}개가 본문과 다르다.`; Game.submitWrong(document.getElementById('pzCard')); }
  },
  spinDial(d,dir){
    const n=this.cur.symbols.length;
    this.dialPos[d]=(this.dialPos[d]+dir+n)%n;
    this.renderDials();
  },
  renderDials(){
    this.dialPos.forEach((p,d)=>{
      const w=document.getElementById('dw'+d), nm=document.getElementById('dn'+d);
      if(w){ w.innerHTML=IC[this.cur.symbols[p]]; }
      if(nm){ nm.textContent=this.cur.symbolNames[p]; }
    });
  },
  checkDial(){
    const ok=this.cur.answerDial.every((v,i)=>this.dialPos[i]===v);
    if(ok) Game.advance();
    else Game.submitWrong(document.querySelector('.dial-wrap'));
  },
  checkMeta(){
    if(!S.items.oil || !S.items.flint){
      document.getElementById('fb').textContent='등대에 부을 기름과 불씨가 없다. 배 안을 수색하라. (상단 [수색])';
      Sound.bad();
      return;
    }
    const fs=this.cur.metaFields;
    let wrong=0, empty=0;
    fs.forEach((f,i)=>{
      const v=this.norm(document.getElementById('mf'+i).value);
      if(!v){ empty++; return; }
      if(!f.answers.some(a=>this.norm(a)===v)) wrong++;
    });
    if(empty){ document.getElementById('fb').textContent='모든 관문을 입력하라.'; return; }
    if(wrong===0) Game.advance();
    else { document.getElementById('fb').textContent=`관문 ${wrong}개가 아직 잠겨 있다.`; Game.submitWrong(document.getElementById('pzCard')); }
  },
};

/* ---------------- 부트 ---------------- */
setInterval(()=>{ if(S&&S.phase!=='lobby') UI.updateTopbar(); },1000);
window.addEventListener('beforeunload',e=>{
  if(S&&(S.phase==='play'||S.phase==='story')&&S.startTs){ e.preventDefault(); e.returnValue=''; }
});
load();
UI.render();
Ambience.arm();
Sync.start();
</script>
